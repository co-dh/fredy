<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fredy dependency graph</title>
<style>
  :root {
    --bg:#14161b; --panel:rgba(24,27,34,.94); --line:#2c313d; --fg:#d7dce5; --dim:#8a93a6; --accent:#ffcc44;
    --thm:#4a9eff; --def:#46c46a; --instance:#b47cff; --ind:#ff9d3a; --axiom:#ff5c66; --opaque:#7a8494;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg); overflow:hidden;
    font:13px/1.45 ui-monospace,"SF Mono",Menlo,Consolas,monospace; }
  #graph { position:absolute; inset:0; }
  .float { position:absolute; background:var(--panel); border:1px solid var(--line); border-radius:8px;
    backdrop-filter:blur(6px); box-shadow:0 6px 24px rgba(0,0,0,.45); }
  /* top-left: title + search */
  #tl { left:12px; top:12px; width:300px; padding:10px; z-index:6; }
  #tl h1 { margin:0 0 8px; font-size:13px; color:var(--accent); font-weight:600; letter-spacing:.3px; }
  #search { width:100%; padding:6px 8px; background:#232733; color:var(--fg); border:1px solid var(--line);
    border-radius:5px; font:inherit; }
  #search:focus { outline:none; border-color:var(--accent); }
  #results { margin-top:6px; max-height:46vh; overflow-y:auto; }
  .row { padding:5px 7px; border-radius:5px; cursor:pointer; border:1px solid transparent; }
  .row:hover,.row.on { background:#232733; border-color:var(--accent); }
  .row .nm { word-break:break-all; }
  .row .meta { color:var(--dim); font-size:11px; margin-top:1px; }
  .kindtag { display:inline-block; padding:0 5px; border-radius:3px; font-size:10px; color:#10131a;
    font-weight:700; vertical-align:middle; }
  /* top-right: controls */
  #tr { right:12px; top:12px; padding:8px 10px; z-index:6; color:var(--dim); display:flex; gap:12px; align-items:center; }
  #tr select,#tr button { background:#232733; color:var(--fg); border:1px solid var(--line); border-radius:5px;
    padding:3px 7px; font:inherit; cursor:pointer; }
  #tr label { display:inline-flex; align-items:center; gap:3px; cursor:pointer; }
  #tr .stat { font-size:12px; }
  /* top-left: per-section chapter filters */
  #sections { margin:8px 0 2px; display:flex; flex-direction:column; gap:5px; }
  .secrow { display:flex; flex-wrap:wrap; gap:3px 6px; align-items:center; }
  .secrow label { display:inline-flex; align-items:center; gap:2px; font-size:11px; color:var(--dim); cursor:pointer; }
  .secrow label.master { color:var(--fg); font-weight:600; width:34px; }
  .secrow input { margin:0; cursor:pointer; }
  /* bottom-left: legend (click to toggle) */
  #legend { left:12px; bottom:12px; padding:7px 10px; z-index:6; display:flex; gap:10px; flex-wrap:wrap; font-size:11px; }
  #legend span { display:inline-flex; align-items:center; gap:5px; cursor:pointer; user-select:none; opacity:1; }
  #legend span.off { opacity:.35; text-decoration:line-through; }
  .dot { width:9px; height:9px; border-radius:50%; display:inline-block; }
  /* right: detail */
  #detail { right:12px; top:66px; bottom:12px; width:400px; padding:14px; overflow-y:auto; z-index:7; display:none; }
  #detail.show { display:block; }
  #detail h2 { font-size:14px; margin:0 6px 4px 0; word-break:break-all; }
  #detail .sub { color:var(--dim); font-size:12px; margin-bottom:10px; }
  #detail .sub a { color:var(--thm); cursor:pointer; }
  #detail pre { background:#232733; border:1px solid var(--line); border-radius:5px; padding:8px;
    white-space:pre-wrap; word-break:break-word; font-size:12px; color:#c7cede; margin:0 0 12px; }
  #detail .doc { margin-bottom:12px; }
  #detail h3 { font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:.5px;
    margin:14px 0 5px; border-top:1px solid var(--line); padding-top:10px; }
  #detail .link { padding:3px 6px; border-radius:4px; cursor:pointer; word-break:break-all; }
  #detail .link:hover { background:#232733; }
  #close { float:right; cursor:pointer; color:var(--dim); font-size:18px; line-height:1; }
  #close:hover { color:var(--fg); }
  /* tooltip */
  #tip { position:absolute; pointer-events:none; max-width:340px; z-index:9; padding:7px 9px;
    background:rgba(10,12,16,.97); border:1px solid var(--line); border-radius:6px; display:none;
    box-shadow:0 4px 18px rgba(0,0,0,.5); }
  #tip .nm { word-break:break-all; margin-bottom:3px; }
  #tip .doc { color:var(--dim); font-size:12px; }
  /* center overlay */
  #overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:20;
    background:rgba(20,22,27,.7); text-align:center; padding:40px; }
  #overlay .box { max-width:560px; }
  #overlay.err { color:var(--axiom); }
  #overlay code { color:var(--fg); }
  .hidden { display:none !important; }
</style>
</head>
<body>
<div id="graph"></div>

<div id="tl" class="float">
  <h1>◆ Fredy dependency graph</h1>
  <input id="search" placeholder="search name / type / doc…  (↑↓ enter)">
  <div id="sections"></div>
  <div id="results"></div>
</div>

<div id="tr" class="float">
  <label>edges
    <select id="edgemode">
      <option value="all" selected>all</option>
      <option value="hover">on hover</option>
      <option value="none">none</option>
    </select>
  </label>
  <button id="relayout">re-run layout</button>
  <span class="stat" id="stat">loading…</span>
</div>

<div id="legend" class="float">
  <span data-kind="thm"><i class="dot" style="background:var(--thm)"></i>thm</span>
  <span data-kind="def"><i class="dot" style="background:var(--def)"></i>def</span>
  <span data-kind="instance"><i class="dot" style="background:var(--instance)"></i>inst</span>
  <span data-kind="ind"><i class="dot" style="background:var(--ind)"></i>ind</span>
  <span data-kind="axiom"><i class="dot" style="background:var(--axiom)"></i>axiom</span>
</div>

<div id="detail" class="float"></div>
<div id="tip"></div>
<div id="overlay"><div class="box" id="ovbox">loading graph/*.tsv …</div></div>

<script type="module">
import Graph from "https://cdn.jsdelivr.net/npm/graphology@0.25/+esm";
import Sigma from "https://cdn.jsdelivr.net/npm/sigma@3/+esm";
import forceAtlas2 from "https://cdn.jsdelivr.net/npm/graphology-layout-forceatlas2@0.10/+esm";

const KIND = { thm:'#4a9eff', def:'#46c46a', instance:'#b47cff', ind:'#ff9d3a', axiom:'#ff5c66', opaque:'#7a8494' };
// bucket a decl by its source file into a section group: "1.6" = chapter.firstDigit (S1_6*),
// "2.1" (S2_1*), or "A6"/"A10" for the Algebra-of-Programming appendix; "other" = tool files (always shown).
const sectionOf = f => {
  let m;
  if (m = f.match(/\/S(\d+)_(\d)/)) return m[1] + '.' + m[2];
  if (m = f.match(/\/A(\d+)_/))     return 'A' + m[1];
  return (f.split('/').pop()||'other').replace(/\.lean$/,'');   // infra/tool files: bucket by basename
};
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const kindTag = k => `<span class="kindtag" style="background:${KIND[k]||'#7a8494'}">${k||'?'}</span>`;
const overlay = $('#overlay'), ovbox = $('#ovbox');
function fail(msg){ overlay.classList.add('err'); ovbox.innerHTML = msg; }

const decl = new Map();               // name -> {kind,file,line,type,doc}
let graph, sigma;

async function main(){
  // ---- load data ----
  let dTxt, eTxt;
  try {
    const nocache = { cache:'no-store' };   // always re-fetch the .tsv; they change on every regen
    [dTxt, eTxt] = await Promise.all([
      fetch('../decls.tsv', nocache).then(r=>{ if(!r.ok) throw new Error('decls.tsv '+r.status); return r.text(); }),
      fetch('../deps.tsv', nocache).then(r=>{ if(!r.ok) throw new Error('deps.tsv '+r.status); return r.text(); }),
    ]);
  } catch (err) {
    return fail(`could not load graph/*.tsv — serve over http (browsers block file://).<br><br>`
      + `run <code>scripts/lean-graph</code> from the repo root, or regenerate first:<br>`
      + `<code>lake env lean --run scripts/ExtractGraph.lean</code><br><br><small>${esc(err.message)}</small>`);
  }
  for (const ln of dTxt.split('\n')){ if(!ln) continue; const p=ln.split('\t');
    decl.set(p[0], { kind:p[1], file:p[2], line:+p[3], type:p[4]||'', doc:p[5]||'', sec:sectionOf(p[2]) }); }

  // ---- build graphology graph ----
  ovbox.textContent = 'building graph…'; await frame();
  graph = new Graph({ type:'directed', multi:false, allowSelfLoops:false });
  const indeg = new Map();
  for (const ln of eTxt.split('\n')){ if(!ln) continue;
    const i = ln.indexOf('\t'); if(i<0) continue;
    const s = ln.slice(0,i), t = ln.slice(i+1);
    if (decl.has(t)) indeg.set(t, (indeg.get(t)||0)+1);
  }
  for (const [name,d] of decl){
    graph.addNode(name, {
      x: Math.random()*1000, y: Math.random()*1000,
      size: 2 + Math.min(13, Math.sqrt(indeg.get(name)||0)*0.9),
      color: KIND[d.kind] || '#7a8494',
      label: name.split('.').slice(-2).join('.'),
    });
  }
  let nedges = 0;
  for (const ln of eTxt.split('\n')){ if(!ln) continue;
    const i = ln.indexOf('\t'); if(i<0) continue;
    const s = ln.slice(0,i), t = ln.slice(i+1);
    if (graph.hasNode(s) && graph.hasNode(t) && !graph.hasDirectedEdge(s,t)){ graph.addDirectedEdge(s,t); nedges++; }
  }
  $('#stat').textContent = `${graph.order.toLocaleString()} nodes · ${nedges.toLocaleString()} edges`;

  // ---- Sigma ----
  sigma = new Sigma(graph, $('#graph'), {
    defaultEdgeColor:'#262b36', defaultEdgeType:'line',
    labelColor:{ color:'#cfd6e2' }, labelFont:'ui-monospace, monospace', labelSize:11,
    labelRenderedSizeThreshold:9, labelDensity:0.6, zIndex:true,
    nodeReducer, edgeReducer,
  });
  wireEvents();

  // ---- layout ----
  runLayout();
}

/* ---------- reducers (hover/select highlight + kind filter) ---------- */
let active=null, neigh=new Set(), selected=null, hiddenKinds=new Set(), hiddenSections=new Set();
function nodeReducer(node, data){
  const res = Object.assign({}, data);
  const dd = decl.get(node);
  if (hiddenKinds.has(dd?.kind) || hiddenSections.has(dd?.sec)){ res.hidden=true; return res; }
  // no global dimming: only emphasize the hovered node + its neighbors, leave everything else untouched
  if (node===active){ res.zIndex=3; res.forceLabel=true; res.size=data.size*1.6; }     // pop by size
  else if (active && neigh.has(node)){ res.zIndex=2; res.forceLabel=true; }            // neighbors: label them
  if (node===selected){ res.zIndex=3; res.forceLabel=true; }
  return res;
}
function edgeReducer(edge, data){
  const res = Object.assign({}, data);
  const ex = graph.extremities(edge), s=ex[0], t=ex[1];
  const ds=decl.get(s), dt=decl.get(t);
  if (hiddenKinds.has(ds?.kind)||hiddenKinds.has(dt?.kind)||hiddenSections.has(ds?.sec)||hiddenSections.has(dt?.sec)){ res.hidden=true; return res; }
  const mode = $('#edgemode').value;
  const inc = active && (s===active || t===active);
  if (mode==='none'){ res.hidden = !inc; }
  else if (mode==='hover'){ res.hidden = !inc; }
  else { // all: keep the whole edge sea as-is, just brighten the hovered node's own edges
    if (active && inc){ res.color='#ffcc44'; res.zIndex=1; }
  }
  return res;
}

/* ---------- events ---------- */
function wireEvents(){
  sigma.on('enterNode', ({node})=> setActive(node, true));
  sigma.on('leaveNode', ()=> setActive(null));
  sigma.on('clickNode', ({node})=> openDetail(node));
  sigma.on('clickStage', ()=>{ selected=null; closeDetail(); sigma.refresh(); });
  $('#edgemode').addEventListener('change', ()=> sigma.refresh());
  $('#relayout').addEventListener('click', runLayout);
  document.querySelectorAll('#legend span').forEach(el=> el.addEventListener('click', ()=>{
    const k=el.dataset.kind; if(hiddenKinds.has(k)){hiddenKinds.delete(k);el.classList.remove('off');}
    else {hiddenKinds.add(k);el.classList.add('off');} sigma.refresh();
  }));
  buildSections();
  addEventListener('keydown', e=>{ if(e.key==='Escape'){ selected=null; closeDetail(); sigma.refresh(); } });
}

/* ---------- per-section chapter filters (a checkbox per group like 1.6, built from the data) ---------- */
function buildSections(){
  const groups = { '1':new Set(), '2':new Set(), 'aop':new Set(), 'other':new Set() };
  for (const d of decl.values()){
    if (/^\d\.\d$/.test(d.sec)) groups[d.sec[0]].add(d.sec);
    else if (/^A\d+$/.test(d.sec)) groups.aop.add(d.sec);
    else groups.other.add(d.sec);                                // infra/tool files, one checkbox each
  }
  // short label ("1.6"→"6", "A10"→"10"); infra files keep their full basename
  const sub = (s,key) => key==='other' ? s : (s[0]==='A' ? s.slice(1) : s.slice(2));
  $('#sections').innerHTML = [['1','Ch1'],['2','Ch2'],['aop','AOP'],['other','Other']].map(([key,label])=>{
    const secs=[...groups[key]].sort((a,b)=> key==='other' ? a.localeCompare(b) : (+sub(a,key))-(+sub(b,key)));
    if(!secs.length) return '';
    return `<div class="secrow"><label class="master" title="toggle all ${label}"><input type="checkbox" checked>${label}</label>`
      + secs.map(s=>`<label title="${s}"><input type="checkbox" class="secbox" value="${s}" checked>${sub(s,key)}</label>`).join('')
      + `</div>`;
  }).join('');
  $('#sections').querySelectorAll('.secbox').forEach(cb=> cb.addEventListener('change', ()=>{
    cb.checked ? hiddenSections.delete(cb.value) : hiddenSections.add(cb.value);
    syncMasters(); sigma.refresh();
  }));
  $('#sections').querySelectorAll('.master input').forEach(cb=> cb.addEventListener('change', ()=>{
    cb.closest('.secrow').querySelectorAll('.secbox').forEach(x=>{
      x.checked=cb.checked; x.checked ? hiddenSections.delete(x.value) : hiddenSections.add(x.value);
    });
    cb.indeterminate=false; sigma.refresh();
  }));
}
function syncMasters(){
  document.querySelectorAll('#sections .secrow').forEach(row=>{
    const boxes=[...row.querySelectorAll('.secbox')], on=boxes.filter(b=>b.checked).length;
    const m=row.querySelector('.master input');
    m.checked = on>0; m.indeterminate = on>0 && on<boxes.length;
  });
}
function setActive(node, tip){
  active = node;
  neigh = node ? new Set([...graph.inNeighbors(node), ...graph.outNeighbors(node)]) : new Set();
  sigma.refresh();
  const t=$('#tip');
  if (node && tip){
    const d=decl.get(node), p=sigma.graphToViewport(graph.getNodeAttributes(node));
    t.style.display='block';
    t.style.left=Math.min(p.x+14, innerWidth-350)+'px'; t.style.top=(p.y+14)+'px';
    t.innerHTML=`<div class="nm">${kindTag(d.kind)} ${esc(node)}</div>`
      + (d.doc?`<div class="doc">${esc(d.doc)}</div>`
        : d.type?`<div class="doc" style="opacity:.6">${esc(d.type.slice(0,140))}</div>`
        : `<div class="doc" style="opacity:.5">no doc</div>`);
  } else t.style.display='none';
}

/* ---------- detail panel ---------- */
function openDetail(name){
  const d = decl.get(name); if(!d) return;
  selected = name;
  const uses = graph.outNeighbors(name).filter(n=>decl.has(n));
  const usedBy = graph.inNeighbors(name);
  const el = $('#detail'); el.classList.add('show');
  el.innerHTML = `<span id="close">×</span>`
    + `<h2>${esc(name)}</h2>`
    + `<div class="sub">${kindTag(d.kind)} &nbsp;<a id="loc">${esc(d.file)}:${d.line}</a></div>`
    + (d.doc?`<div class="doc">${esc(d.doc)}</div>`:'')
    + (d.type?`<pre>${esc(d.type)}</pre>`:'')
    + `<h3>uses (${uses.length})</h3>` + linkList(uses)
    + `<h3>used by (${usedBy.length})</h3>` + linkList(usedBy.slice(0,200))
    + (usedBy.length>200?`<div class="sub">… ${usedBy.length-200} more</div>`:'');
  $('#close').onclick = closeDetail;
  $('#loc').onclick = e=>{ navigator.clipboard?.writeText(`${d.file}:${d.line}`); e.target.textContent=`${d.file}:${d.line}  (copied)`; };
  el.querySelectorAll('[data-name]').forEach(a=> a.onclick=()=> focusNode(a.dataset.name));
  sigma.refresh();
}
function closeDetail(){ $('#detail').classList.remove('show'); }
function linkList(arr){
  if(!arr.length) return '<div class="sub" style="opacity:.5">none</div>';
  return arr.map(n=>{ const d=decl.get(n)||{}; return `<div class="link" data-name="${esc(n)}">${kindTag(d.kind)} ${esc(n)}</div>`; }).join('');
}
function focusNode(name){
  if(!graph.hasNode(name)) return;
  const p = sigma.getNodeDisplayData(name);
  sigma.getCamera().animate({ x:p.x, y:p.y, ratio:0.15 }, { duration:400 });
  openDetail(name);
}

/* ---------- search ---------- */
const search=$('#search'), results=$('#results'); let curList=[], curSel=-1;
function runSearch(){
  const q=search.value.trim().toLowerCase(); const out=[];
  if(q){ for(const [n,d] of decl){
      if(n.toLowerCase().includes(q)||d.doc.toLowerCase().includes(q)||d.type.toLowerCase().includes(q)){
        out.push([ n.toLowerCase().startsWith(q)?0 : n.toLowerCase().includes(q)?1:2, n, d ]);
        if(out.length>400) break;
      } }
    out.sort((a,b)=> a[0]-b[0] || a[1].length-b[1].length);
  }
  curList=out.slice(0,60); curSel=-1;
  results.innerHTML = curList.map(([,n,d],i)=>
    `<div class="row" data-i="${i}" data-name="${esc(n)}"><div class="nm">${kindTag(d.kind)} ${esc(n)}</div>`
    + (d.doc?`<div class="meta">${esc(d.doc.slice(0,80))}</div>`:'')+`</div>`).join('');
  results.querySelectorAll('.row').forEach(el=> el.onclick=()=> focusNode(el.dataset.name));
}
search.addEventListener('input', runSearch);
search.addEventListener('keydown', e=>{
  if(e.key==='ArrowDown'||e.key==='ArrowUp'){ e.preventDefault(); curSel+= e.key==='ArrowDown'?1:-1;
    curSel=Math.max(0,Math.min(curList.length-1,curSel));
    results.querySelectorAll('.row').forEach((el,i)=> el.classList.toggle('on', i===curSel));
    const el=results.querySelector(`[data-i="${curSel}"]`); if(el) el.scrollIntoView({block:'nearest'});
  } else if(e.key==='Enter' && curList.length){ focusNode(curList[Math.max(0,curSel)][1]); }
});

/* ---------- layout (chunked ForceAtlas2, non-freezing) ---------- */
let layoutRunning=false;
function runLayout(){
  if(layoutRunning) return; layoutRunning=true;
  const settings = Object.assign(forceAtlas2.inferSettings(graph), { barnesHutOptimize:true, gravity:1.2, slowDown:2 });
  const TOTAL=300; let done=0;
  overlay.classList.remove('hidden');
  (function stepLoop(){
    if(done>=TOTAL){ overlay.classList.add('hidden'); layoutRunning=false; return; }
    const chunk=Math.min(12, TOTAL-done);
    forceAtlas2.assign(graph, { iterations:chunk, settings }); done+=chunk;
    ovbox.textContent = `laying out…  ${done}/${TOTAL}`;
    sigma.refresh();
    requestAnimationFrame(stepLoop);
  })();
}
const frame = ()=> new Promise(requestAnimationFrame);
main();
</script>
</body>
</html>
