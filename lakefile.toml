name = "fredy"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["Fredy"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
linter.unusedSectionVars = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

# mathlib dependency — used ONLY by Fredy/CapitalizationTransfinite tower (§1.543) for ordinal /
# transfinite-recursion API (Freyd treats transfinite recursion as ambient set theory; CLAUDE.md
# permits mathlib here). Every other Fredy file stays mathlib-free. Checkout + oleans already present
# under .lake/packages at this rev (v4.28.0), so no network build is needed.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "8f9d9cff6b"

[[lean_lib]]
name = "Fredy"
