<svg xmlns="http://www.w3.org/2000/svg" width="920" height="1300" viewBox="0 0 920 1300">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="context-stroke" stroke-width="1.6"/>
    </marker>
    <marker id="cov" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto-start-reverse">
      <path d="M 1 1.5 L 10 6 L 1 10.5 Z" fill="#fff" stroke="context-stroke" stroke-width="1.3"/>
    </marker>
    <marker id="tail" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <line x1="2" y1="0.5" x2="2" y2="9.5" stroke="context-stroke" stroke-width="1.8"/>
    </marker>
  </defs>

  <style>
    .node { font: italic 22px Georgia, serif; text-anchor: middle; }
    .lbl  { font: italic 17px Georgia, serif; text-anchor: middle; }
    .lbls { font: italic 13px Georgia, serif; text-anchor: middle; }
    .cap  { font: 15px Georgia, serif; fill: #333; }
    .ttl  { font: bold 16px Georgia, serif; fill: #111; }
    .sub  { font: 13px Georgia, serif; fill: #666; }
    .oA  { fill: #7b1fa2; }
    .oB  { fill: #1565c0; }
    .oT  { fill: #e65100; }
    .oP  { fill: #2e7d32; }
    .oI  { fill: #c2185b; }
    .oAA { fill: #00695c; }
    .oJ  { fill: #5d4037; }
  </style>

  <text class="ttl" x="60" y="30">§1.564  x is a cover ⇒ R entire — names match `tabulated_is_entire_iff_left_cover` in Fredy/S1_56.lean</text>

  <!-- ============ Panel 0: construction of d from pullback of (y,y) ============ -->
  <text class="sub" x="60" y="60">Panel 0 — pullback of (y,y): pair ⟨1_T, 1_T⟩ over y induces unique lift d : T → P with d≫l = 1, d≫r = 1.</text>

  <text class="node oT" x="380" y="92">T</text>
  <text class="node oP" x="380" y="180">P</text>
  <text class="node oT" x="200" y="272">T</text>
  <text class="node oT" x="560" y="272">T</text>
  <text class="node oB" x="380" y="388">B</text>

  <line x1="380" y1="110" x2="380" y2="162" stroke="#8e24aa" stroke-width="1.9"
        stroke-dasharray="7 5" marker-end="url(#arr)"/>
  <text class="lbl" x="406" y="142" fill="#8e24aa">d</text>

  <path d="M 365 106 C 300 130, 240 190, 212 254" fill="none" stroke="#999" stroke-width="1.3"
        marker-end="url(#arr)"/>
  <text class="lbls" x="270" y="165" fill="#999">1</text>
  <path d="M 395 106 C 460 130, 520 190, 548 254" fill="none" stroke="#999" stroke-width="1.3"
        marker-end="url(#arr)"/>
  <text class="lbls" x="498" y="165" fill="#999">1</text>

  <line x1="360" y1="195" x2="215" y2="258" stroke="#2e7d32" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl" x="265" y="234" fill="#2e7d32">l</text>
  <line x1="400" y1="195" x2="545" y2="258" stroke="#827717" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl" x="494" y="218" fill="#827717">r</text>

  <line x1="360" y1="200" x2="380" y2="217" stroke="#222" stroke-width="1.2"/>
  <line x1="400" y1="200" x2="380" y2="217" stroke="#222" stroke-width="1.2"/>

  <line x1="195" y1="288" x2="368" y2="378" stroke="#1565c0" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl oB" x="250" y="338">y</text>
  <line x1="565" y1="288" x2="392" y2="378" stroke="#1565c0" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl oB" x="524" y="338">y</text>

  <text class="lbls" x="660" y="190" fill="#333">hd₁ : d ≫ l = 1_T</text>
  <text class="lbls" x="660" y="214" fill="#333">hd₂ : d ≫ r = 1_T</text>
  <text class="lbls" x="660" y="238" fill="#555">pullback condition: l ≫ y = r ≫ y</text>

  <!-- ============ Panel 1: composition RR° ============ -->
  <text class="sub" x="60" y="438">Panel 1 — composition RR°: pullback of (y,y), image of ⟨l≫x, r≫x⟩ into A×A.  RR° = (I; i≫fst, i≫snd).</text>

  <text class="node oAA" x="380" y="474">A × A</text>
  <text class="node oI"  x="380" y="548">I</text>
  <text class="node oP"  x="380" y="624">P</text>
  <text class="node oT"  x="250" y="718">T</text>
  <text class="node oT"  x="510" y="718">T</text>
  <text class="node oA"  x="110" y="814">A</text>
  <text class="node oB"  x="380" y="814">B</text>
  <text class="node oA"  x="650" y="814">A</text>

  <line x1="380" y1="530" x2="380" y2="492" stroke="#c2185b" stroke-width="1.6"
        marker-start="url(#tail)" marker-end="url(#arr)"/>
  <text class="lbl oI" x="402" y="514">i</text>

  <line x1="380" y1="606" x2="380" y2="566" stroke="#00838f" stroke-width="1.6" marker-end="url(#cov)"/>
  <text class="lbl" x="396" y="590" fill="#00838f">c</text>

  <line x1="365" y1="636" x2="262" y2="706" stroke="#2e7d32" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl" x="300" y="678" fill="#2e7d32">l</text>
  <line x1="395" y1="636" x2="498" y2="706" stroke="#827717" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl" x="464" y="664" fill="#827717">r</text>

  <line x1="360" y1="638" x2="380" y2="656" stroke="#222" stroke-width="1.2"/>
  <line x1="400" y1="638" x2="380" y2="656" stroke="#222" stroke-width="1.2"/>

  <line x1="238" y1="732" x2="120" y2="800" stroke="#e65100" stroke-width="1.6" marker-end="url(#cov)"/>
  <text class="lbl" x="153" y="772" fill="#e65100">x</text>
  <line x1="262" y1="732" x2="368" y2="800" stroke="#1565c0" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl" x="310" y="774" fill="#1565c0">y</text>

  <line x1="498" y1="732" x2="392" y2="800" stroke="#1565c0" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl" x="460" y="774" fill="#1565c0">y</text>
  <line x1="522" y1="732" x2="640" y2="800" stroke="#e65100" stroke-width="1.6" marker-end="url(#cov)"/>
  <text class="lbl" x="610" y="772" fill="#e65100">x</text>

  <line x1="362" y1="558" x2="120" y2="800" stroke="#c2185b" stroke-width="1.3" marker-end="url(#arr)"/>
  <text class="lbls oI" x="190" y="656">i ≫ fst</text>
  <line x1="398" y1="558" x2="640" y2="800" stroke="#c2185b" stroke-width="1.3" marker-end="url(#arr)"/>
  <text class="lbls oI" x="585" y="656">i ≫ snd</text>

  <!-- ============ Panel 2: pullback J of (Δ,i), lift t, k iso, witness ============ -->
  <text class="sub" x="60" y="862">Panel 2 — J := pullback of (Δ,i).  t lifts ⟨x, d≫c⟩.  x = t≫k is a cover ⇒ k iso (§1.363).  k⁻¹ ≫ j : A → I witnesses 1 ⊑ RR°.</text>

  <text class="node oT"  x="195" y="918">T</text>
  <text class="node oJ"  x="320" y="978">J</text>
  <text class="node oI"  x="520" y="978">I</text>
  <text class="node oA"  x="170" y="1138">A</text>
  <text class="node oAA" x="520" y="1138">A×A</text>

  <!-- d ≫ c : T -> I -->
  <path d="M 214 904 C 320 878, 440 898, 504 962" fill="none" stroke="#666" stroke-width="1.6"
        marker-end="url(#arr)"/>
  <text class="lbl" x="370" y="884" fill="#666">d ≫ c</text>

  <!-- x : T -|> A -->
  <path d="M 186 930 C 172 1032, 168 1092, 178 1122" fill="none" stroke="#e65100" stroke-width="1.6"
        marker-end="url(#cov)"/>
  <text class="lbl" x="139" y="1020" fill="#e65100">x</text>

  <!-- t : T -> J, dashed = unique lift -->
  <line x1="212" y1="924" x2="302" y2="968" stroke="#666" stroke-width="1.6"
        stroke-dasharray="6 4" marker-end="url(#arr)"/>
  <text class="lbl" x="244" y="938" fill="#666">t</text>

  <!-- j : J -> I -->
  <line x1="338" y1="972" x2="500" y2="972" stroke="#f9a825" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl" x="418" y="960" fill="#f9a825">j</text>

  <!-- k : J ⇄ A, arrow at both ends = iso -->
  <line x1="305" y1="994" x2="185" y2="1122" stroke="#455a64" stroke-width="1.6"
        marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text class="lbl" x="228" y="1062" fill="#455a64">k</text>

  <!-- pullback corner at J -->
  <line x1="346" y1="972" x2="346" y2="998" stroke="#222" stroke-width="1.2"/>
  <line x1="320" y1="998" x2="346" y2="998" stroke="#222" stroke-width="1.2"/>

  <!-- i : I >-> AxA -->
  <line x1="520" y1="988" x2="520" y2="1120" stroke="#c2185b" stroke-width="1.6"
        marker-start="url(#tail)" marker-end="url(#arr)"/>
  <text class="lbl oI" x="538" y="1060">i</text>

  <!-- Δ : A >-> AxA -->
  <line x1="200" y1="1132" x2="489" y2="1132" stroke="#7b1fa2" stroke-width="1.6"
        marker-start="url(#tail)" marker-end="url(#arr)"/>
  <text class="lbl oA" x="345" y="1158">Δ</text>

  <!-- k⁻¹ ≫ j : A -> I, blue dashed = the witness -->
  <path d="M 190 1128 C 260 1118, 370 1054, 502 984" fill="none" stroke="#1a6fd4" stroke-width="2.0"
        stroke-dasharray="7 5" marker-end="url(#arr)"/>
  <text class="lbl" x="370" y="1074" fill="#1a6fd4">k⁻¹ ≫ j</text>

  <text class="cap" x="600" y="1012">hdl : (d ≫ c) ≫ i = x ≫ Δ</text>
  <text class="cap" x="600" y="1040">t := pbJ.lift ⟨T, x, d ≫ c⟩,  ht : t ≫ k = x</text>
  <text class="cap" x="600" y="1068">x cover, k monic ⇒ k iso (§1.363)</text>
  <text class="cap" x="600" y="1096">hk_inv_k : k⁻¹ ≫ k = 1</text>
  <text class="cap" x="600" y="1124">pf₁ : (k⁻¹ ≫ j) ≫ (i ≫ fst) = 1</text>
  <text class="cap" x="600" y="1152">pf₂ : (k⁻¹ ≫ j) ≫ (i ≫ snd) = 1</text>

  <!-- ============ legend ============ -->
  <text class="sub" x="60" y="1200">─▷ hollow head = cover,   ↣ tailed = monic,   ⇄ arrow at both ends = iso,   corner = pullback,   dashed = induced / witness.</text>

  <text class="cap" x="60" y="1226">0.  P is pullback of (y,y) with projections l,r.  Pair ⟨1,1⟩ over y induces unique lift d:T→P with d≫l = d≫r = 1.</text>
  <text class="cap" x="60" y="1250">1.  sp = ⟨l≫x, r≫x⟩ : P→A×A;  I = image sp, so sp = c≫i with c cover, i monic.  RR° = (I; i≫fst, i≫snd).</text>
  <text class="cap" x="60" y="1274">2.  J := pullback of (Δ,i);  hdl makes ⟨x, d≫c⟩ a cone, ∃! t with t≫k=x.  x cover, k monic ⇒ k iso.  k⁻¹≫j : A→I is the witness. ∎</text>
</svg>
