<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="740" viewBox="0 0 1200 740">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#222" stroke-width="1.6"/>
    </marker>
    <marker id="arrg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#666" stroke-width="1.6"/>
    </marker>
    <marker id="arrb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#1a6fd4" stroke-width="1.8"/>
    </marker>
    <!-- hollow triangle head = COVER -->
    <marker id="cov" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto-start-reverse">
      <path d="M 1 1.5 L 10 6 L 1 10.5 Z" fill="#fff" stroke="#222" stroke-width="1.3"/>
    </marker>
    <!-- tail bar = MONIC: |-> -->
    <marker id="tail" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <line x1="2" y1="0.5" x2="2" y2="9.5" stroke="#222" stroke-width="1.8"/>
    </marker>
  </defs>

  <style>
    .node { font: italic 22px Georgia, serif; fill: #111; text-anchor: middle; }
    .lbl  { font: italic 17px Georgia, serif; fill: #222; text-anchor: middle; }
    .lblg { font: italic 16px Georgia, serif; fill: #666; text-anchor: middle; }
    .lblb { font: italic 18px Georgia, serif; fill: #1a6fd4; text-anchor: middle; }
    .cap  { font: 15px Georgia, serif; fill: #333; }
    .ttl  { font: bold 16px Georgia, serif; fill: #111; }
    .sub  { font: 13px Georgia, serif; fill: #666; }
  </style>

  <text class="ttl" x="60" y="30">§1.564   x is a cover  ⇒  R is entire:   RR° per §1.56</text>
  <text class="ttl" x="830" y="30">graph(1_A) ⊑ RR°   (§1.413)</text>
  <text class="sub" x="60" y="560">─▷ hollow head = cover,   ↣ tailed = monic,   corner at P = pullback,   dashed = induced</text>
  <line x1="790" y1="60" x2="790" y2="540" stroke="#ccc" stroke-width="1"/>

  <!-- ===================== Panel 1: §1.56 composition, product at top ===================== -->
  <!-- nodes -->
  <text class="node" x="380" y="66">A × A</text>
  <text class="node" x="380" y="146">I</text>
  <text class="node" x="380" y="236">P</text>
  <text class="node" x="235" y="356">T</text>
  <text class="node" x="525" y="356">T</text>
  <text class="node" x="95"  y="486">A</text>
  <text class="node" x="380" y="486">B</text>
  <text class="node" x="665" y="486">A</text>

  <!-- pair map of RR°:  I >-> A×A, monic -->
  <line x1="380" y1="128" x2="380" y2="80" stroke="#222" stroke-width="1.6"
        marker-start="url(#tail)" marker-end="url(#arr)"/>
  <text class="lbl" x="424" y="108">⟨i₁, i₂⟩</text>

  <!-- c : P -|> I, cover -->
  <line x1="380" y1="218" x2="380" y2="164" stroke="#222" stroke-width="1.6" marker-end="url(#cov)"/>
  <text class="lbl" x="394" y="196">c</text>

  <!-- the pair of the composite span:  P -> A×A,  equal to c then the monic -->
  <path d="M 393 224 C 510 190, 515 110, 424 74" fill="none" stroke="#666" stroke-width="1.4"
        marker-end="url(#arrg)"/>
  <text class="lblg" x="580" y="140">⟨q₁ ≫ x, q₂ ≫ x⟩</text>

  <!-- pullback projections q1, q2 -->
  <line x1="366" y1="244" x2="248" y2="342" stroke="#222" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl" x="325" y="302">q₁</text>
  <line x1="394" y1="244" x2="512" y2="342" stroke="#222" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl" x="475" y="282">q₂</text>

  <!-- pullback corner at P: two short lines forming a quadrangle with q1 and q2 -->
  <line x1="360" y1="251" x2="380" y2="268" stroke="#222" stroke-width="1.2"/>
  <line x1="400" y1="251" x2="380" y2="268" stroke="#222" stroke-width="1.2"/>

  <!-- d : T -> P, kernel-pair diagonal, dashed -->
  <path d="M 250 340 C 280 272, 310 248, 360 240" fill="none" stroke="#666" stroke-width="1.6"
        stroke-dasharray="6 4" marker-end="url(#arrg)"/>
  <text class="lblg" x="287" y="290">d</text>

  <!-- columns of R = (T; x, y), x is a cover -->
  <line x1="220" y1="368" x2="104" y2="472" stroke="#222" stroke-width="1.6" marker-end="url(#cov)"/>
  <text class="lbl" x="143" y="412">x</text>
  <line x1="250" y1="368" x2="366" y2="472" stroke="#222" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl" x="289" y="430">y</text>

  <!-- columns of R° = (T; y, x) -->
  <line x1="510" y1="368" x2="394" y2="472" stroke="#222" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl" x="471" y="430">y</text>
  <line x1="540" y1="368" x2="656" y2="472" stroke="#222" stroke-width="1.6" marker-end="url(#cov)"/>
  <text class="lbl" x="617" y="412">x</text>

  <!-- columns of the image table RR° = (I; i1, i2) -->
  <line x1="365" y1="156" x2="102" y2="470" stroke="#222" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl" x="212" y="295">i₁</text>
  <line x1="395" y1="156" x2="658" y2="470" stroke="#222" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl" x="548" y="295">i₂</text>

  <!-- ===================== Panel 2: table containment graph(1_A) ⊑ RR° ===================== -->
  <text class="node" x="880" y="250">A</text>
  <text class="node" x="1090" y="250">I</text>
  <text class="node" x="880" y="480">A</text>
  <text class="node" x="1090" y="480">A</text>

  <!-- graph(1_A) columns -->
  <line x1="880" y1="262" x2="880" y2="466" stroke="#222" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl" x="856" y="368">1_A</text>
  <line x1="893" y1="262" x2="1078" y2="466" stroke="#222" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl" x="930" y="288">1_A</text>

  <!-- RR° columns -->
  <line x1="1077" y1="262" x2="893" y2="466" stroke="#222" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl" x="1043" y="288">i₁</text>
  <line x1="1090" y1="262" x2="1090" y2="466" stroke="#222" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl" x="1112" y="368">i₂</text>

  <!-- h, the containment morphism -->
  <line x1="898" y1="244" x2="1068" y2="244" stroke="#1a6fd4" stroke-width="1.9"
        stroke-dasharray="7 5" marker-end="url(#arrb)"/>
  <text class="lblb" x="983" y="230">h</text>

  <text class="lbl" x="985" y="528">h ≫ i₁ = 1_A,   h ≫ i₂ = 1_A</text>

  <!-- ===================== caption: the proof ===================== -->
  <text class="cap" x="60" y="586">1.  §1.56: to compose R = (T; x, y) with R° = (T; y, x), pull back the two y-columns over B (corner at P).  Both tables share the top T,</text>
  <text class="cap" x="60" y="610">     so P is the kernel pair of y:  q₁ ≫ y = q₂ ≫ y.</text>
  <text class="cap" x="60" y="634">2.  The pair ⟨q₁ ≫ x, q₂ ≫ x⟩ : P → A×A factors as the cover c followed by the monic ⟨i₁, i₂⟩:  the image table  RR° = (I; i₁, i₂).</text>
  <text class="cap" x="60" y="658">3.  d = kernel-pair diagonal (d ≫ q₁ = d ≫ q₂ = 1_T), so  u := d ≫ c  has  u ≫ ⟨i₁, i₂⟩ = ⟨x, x⟩ = x ≫ Δ,  where  Δ = ⟨1_A, 1_A⟩  is the</text>
  <text class="cap" x="60" y="682">     pair map of  graph(1_A) = A ←1_A— A —1_A→ A.</text>
  <text class="cap" x="60" y="706">4.  Pull ⟨i₁, i₂⟩ back along Δ:  J ↣ A is monic; by 3, x factors through it; x a cover ⇒ J ↣ A is iso.  This yields h : A → I (right panel)</text>
  <text class="cap" x="60" y="730">     with  h ≫ i₁ = h ≫ i₂ = 1_A,  the table containment  graph(1_A) ⊑ RR°:   R is ENTIRE.  ∎</text>
</svg>
