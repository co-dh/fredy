<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1050" viewBox="0 0 900 1050">
  <defs>
    <!-- markers pick up the line's own color via context-stroke -->
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="context-stroke" stroke-width="1.6"/>
    </marker>
    <!-- hollow triangle head = COVER -->
    <marker id="cov" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto-start-reverse">
      <path d="M 1 1.5 L 10 6 L 1 10.5 Z" fill="#fff" stroke="context-stroke" stroke-width="1.3"/>
    </marker>
    <!-- tail bar = MONIC: |-> -->
    <marker id="tail" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <line x1="2" y1="0.5" x2="2" y2="9.5" stroke="context-stroke" stroke-width="1.8"/>
    </marker>
  </defs>

  <style>
    .node { font: italic 22px Georgia, serif; text-anchor: middle; }
    .lbl  { font: italic 17px Georgia, serif; text-anchor: middle; }
    .lbls { font: italic 13px Georgia, serif; text-anchor: middle; }
    .cap  { font: 15px Georgia, serif; fill: #333; }
    .ttl  { font: bold 16px Georgia, serif; fill: #111; }
    .sub  { font: 13px Georgia, serif; fill: #666; }
    /* one color per object */
    .oA  { fill: #7b1fa2; }  /* A      purple  */
    .oB  { fill: #1565c0; }  /* B      blue    */
    .oT  { fill: #e65100; }  /* T      orange  */
    .oP  { fill: #2e7d32; }  /* P      green   */
    .oI  { fill: #c2185b; }  /* I      magenta */
    .oAA { fill: #00695c; }  /* A x A  teal    */
    .oJ  { fill: #5d4037; }  /* J      brown   */
  </style>

  <text class="ttl" x="60" y="30">§1.564  x is a cover ⇒ R entire — names match `tabulated_is_entire_iff_left_cover` in Fredy/S1_56.lean</text>

  <!-- ============ diagram 1: the composition RR°, product at top ============ -->
  <text class="node oAA" x="380" y="86">A × A</text>
  <text class="node oI"  x="380" y="166">I</text>
  <text class="node oP"  x="380" y="256">P</text>
  <text class="node oT"  x="235" y="376">T</text>
  <text class="node oT"  x="525" y="376">T</text>
  <text class="node oA"  x="380" y="452">A</text>
  <text class="node oA"  x="95"  y="506">A</text>
  <text class="node oB"  x="380" y="506">B</text>
  <text class="node oA"  x="665" y="506">A</text>

  <!-- i = I.arr : I >-> AxA, monic -->
  <line x1="380" y1="148" x2="380" y2="100" stroke="#c2185b" stroke-width="1.6"
        marker-start="url(#tail)" marker-end="url(#arr)"/>
  <text class="lbl oI" x="402" y="128">i</text>

  <!-- c : P -|> I, the cover part of the image factorization of sp = ⟨l ≫ x, r ≫ x⟩ -->
  <line x1="380" y1="238" x2="380" y2="184" stroke="#00838f" stroke-width="1.6" marker-end="url(#cov)"/>
  <text class="lbl" x="396" y="216" fill="#00838f">c</text>

  <!-- pullback projections l, r -->
  <line x1="366" y1="264" x2="248" y2="362" stroke="#2e7d32" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl" x="325" y="322" fill="#2e7d32">l</text>
  <line x1="394" y1="264" x2="512" y2="362" stroke="#827717" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl" x="475" y="296" fill="#827717">r</text>

  <!-- pullback corner at P -->
  <line x1="360" y1="271" x2="380" y2="288" stroke="#222" stroke-width="1.2"/>
  <line x1="400" y1="271" x2="380" y2="288" stroke="#222" stroke-width="1.2"/>

  <!-- d : T -> P, the induced lift pb.lift (T, 1, 1), dashed; hooks under r to reach P from below -->
  <path d="M 506 372 C 430 345, 398 320, 391 272" fill="none" stroke="#8e24aa" stroke-width="1.6"
        stroke-dasharray="6 4" marker-end="url(#arr)"/>
  <text class="lbl" x="438" y="358" fill="#8e24aa">d</text>

  <!-- columns of R = (T; x, y), x is a cover -->
  <line x1="220" y1="388" x2="104" y2="492" stroke="#e65100" stroke-width="1.6" marker-end="url(#cov)"/>
  <text class="lbl" x="143" y="432" fill="#e65100">x</text>
  <line x1="250" y1="388" x2="366" y2="492" stroke="#1565c0" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl" x="289" y="450" fill="#1565c0">y</text>

  <!-- columns of R° = (T; y, x) -->
  <line x1="510" y1="388" x2="394" y2="492" stroke="#1565c0" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl" x="471" y="450" fill="#1565c0">y</text>
  <line x1="540" y1="388" x2="656" y2="492" stroke="#e65100" stroke-width="1.6" marker-end="url(#cov)"/>
  <text class="lbl" x="617" y="432" fill="#e65100">x</text>

  <!-- columns of the image table RR° = (I; i ≫ fst, i ≫ snd) -->
  <line x1="365" y1="176" x2="102" y2="490" stroke="#c2185b" stroke-width="1.3" marker-end="url(#arr)"/>
  <text class="lbls oI" x="186" y="305">i ≫ fst</text>
  <line x1="395" y1="176" x2="658" y2="490" stroke="#c2185b" stroke-width="1.3" marker-end="url(#arr)"/>
  <text class="lbls oI" x="576" y="305">i ≫ snd</text>

  <!-- the identity relation graph(1) = A <-1- A -1-> A, apex between the feet -->
  <line x1="362" y1="458" x2="110" y2="498" stroke="#222" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl" x="230" y="464">1</text>
  <line x1="398" y1="458" x2="650" y2="498" stroke="#222" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl" x="530" y="464">1</text>

  <!-- h : A -> I, the containment witness (constructed in diagram 2); bows left around P -->
  <path d="M 372 438 C 330 380, 325 245, 366 180" fill="none" stroke="#1a6fd4" stroke-width="1.9"
        stroke-dasharray="7 5" marker-end="url(#arr)"/>
  <text class="lbl" x="354" y="340" fill="#1a6fd4">h</text>

  <!-- ============ diagram 2: the witness h, via J := pullback of (Δ, i) ============ -->
  <text class="sub" x="60" y="560">The construction of h — J := the pullback of (Δ, i),  Δ := ⟨1, 1⟩ : A ↣ A×A.</text>

  <text class="node oJ"  x="320" y="600">J</text>
  <text class="node oI"  x="520" y="600">I</text>
  <text class="node oA"  x="320" y="760">A</text>
  <text class="node oAA" x="520" y="760">A×A</text>

  <!-- j : J -> I -->
  <line x1="338" y1="594" x2="500" y2="594" stroke="#f9a825" stroke-width="1.6" marker-end="url(#arr)"/>
  <text class="lbl" x="418" y="582" fill="#f9a825">j</text>

  <!-- k : J >-> A, monic (pullback of the monic i) -->
  <line x1="320" y1="610" x2="320" y2="742" stroke="#455a64" stroke-width="1.6"
        marker-start="url(#tail)" marker-end="url(#arr)"/>
  <text class="lbl" x="336" y="680" fill="#455a64">k</text>

  <!-- pullback corner at J -->
  <line x1="346" y1="594" x2="346" y2="620" stroke="#222" stroke-width="1.2"/>
  <line x1="320" y1="620" x2="346" y2="620" stroke="#222" stroke-width="1.2"/>

  <!-- i : I >-> AxA -->
  <line x1="520" y1="610" x2="520" y2="742" stroke="#c2185b" stroke-width="1.6"
        marker-start="url(#tail)" marker-end="url(#arr)"/>
  <text class="lbl oI" x="538" y="680">i</text>

  <!-- Δ : A >-> AxA -->
  <line x1="341" y1="754" x2="489" y2="754" stroke="#7b1fa2" stroke-width="1.6"
        marker-start="url(#tail)" marker-end="url(#arr)"/>
  <text class="lbl oA" x="415" y="778">Δ</text>

  <!-- e := k⁻¹ : A -> J (the cover x = t ≫ k factors through the monic k: k is iso), blue dashed -->
  <path d="M 306 740 C 282 700, 282 655, 306 612" fill="none" stroke="#1a6fd4" stroke-width="1.9"
        stroke-dasharray="7 5" marker-end="url(#arr)"/>
  <text class="lbl" x="270" y="680" fill="#1a6fd4">e</text>
  <text class="lbl" x="425" y="690" fill="#1a6fd4">h := e ≫ j</text>

  <!-- construction notes, beside the square -->
  <text class="cap" x="600" y="630">t := pbJ.lift ⟨T, x, d ≫ c⟩</text>
  <text class="cap" x="600" y="658">ht : t ≫ k = x</text>
  <text class="cap" x="600" y="686">x is a COVER and k is monic</text>
  <text class="cap" x="600" y="714">⇒ k is an iso,  e := k⁻¹  (hek)</text>

  <!-- ============ legend + caption: the proof steps, in the Lean proof's names ============ -->
  <text class="sub" x="60" y="810">─▷ hollow head = cover,   ↣ tailed = monic,   corner = pullback,   dashed = induced,   blue dashed = the witness.</text>

  <text class="cap" x="60" y="840">1.  l, r := the pullback of (y, y) (corner at P);  sp := ⟨l ≫ x, r ≫ x⟩ : P → A×A;  I := image sp,</text>
  <text class="cap" x="60" y="865">     so  sp = c ≫ i  with c a cover (hc') and i := I.arr monic.   RR° is the table (I; i ≫ fst, i ≫ snd).</text>
  <text class="cap" x="60" y="890">2.  "1 ⊑ RR°" (R ENTIRE) means a morphism h : A → I from the apex of  graph(1) = A ←1— A —1→ A</text>
  <text class="cap" x="60" y="915">     to the apex of RR°, with  pf₁ : h ≫ (i ≫ fst) = 1  and  pf₂ : h ≫ (i ≫ snd) = 1.</text>
  <text class="cap" x="60" y="940">3.  d := pb.lift ⟨T, 1, 1⟩ (hd₁ : d ≫ l = 1, hd₂ : d ≫ r = 1);  both routes T → A×A equal ⟨x, x⟩:</text>
  <text class="cap" x="60" y="965">     hdl : (d ≫ c) ≫ i = x ≫ Δ.</text>
  <text class="cap" x="60" y="990">4.  J := the pullback of (Δ, i) (second diagram):  k is monic (pullback of the monic i);  by hdl the cone</text>
  <text class="cap" x="60" y="1015">     ⟨T, x, d ≫ c⟩ lifts to t;  the COVER x = t ≫ k factors through the monic k, so k is an iso,</text>
  <text class="cap" x="60" y="1040">     e := k⁻¹, and h := e ≫ j gives pf₁, pf₂:  R is ENTIRE.  ∎</text>
</svg>
